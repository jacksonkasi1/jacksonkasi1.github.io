<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#75c9ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Launch & Land 3D</title>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js",
          "@dimforge/rapier3d-compat": "https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.19.3/rapier.mjs"
        }
      }
    </script>
    <script type="module" crossorigin src="/launch-land-3d/assets/index-D9g0O_gP.js"></script>
    <link rel="stylesheet" crossorigin href="/launch-land-3d/assets/index-eN1Tq9Dl.css">
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas" aria-label="Launch and Land 3D game"></canvas>
      <div id="hud" class="hud hidden">
        <div class="hud-top">
          <div class="pill"><span id="level-label">LEVEL 1</span><small id="vehicle-label">CAR</small></div>
          <div class="pill coin-pill"><span class="coin-icon">●</span><span id="coin-count">0</span></div>
          <button id="pause-button" class="icon-button" aria-label="Pause">Ⅱ</button>
          <button id="sound-button" class="icon-button" aria-label="Toggle sound">🔊</button>
        </div>
        <div id="aim-panel" class="aim-panel">
          <div class="meter-row"><span>POWER</span><div class="meter"><i id="power-fill"></i></div><b id="power-value">0%</b></div>
          <div class="meter-row"><span>ANGLE</span><div class="angle-dial"><i id="angle-needle"></i></div><b id="angle-value">35°</b></div>
        </div>
        <div id="health-wrap" class="health-wrap"><span>HEALTH</span><div class="health-bar"><i id="health-fill"></i></div></div>
        <button id="restart-button" class="restart-fab" aria-label="Restart">↻</button>
        <div id="air-hint" class="air-hint hidden"><span>HOLD LEFT<br><b>ROTATE BACK</b></span><span>HOLD RIGHT<br><b>ROTATE FORWARD</b></span></div>
      </div>
      <div id="toast" class="toast hidden"></div>
      <div id="menu-overlay" class="overlay">
        <section class="panel home-panel">
          <div class="logo-mark">🚙</div>
          <h1>Launch <em>&</em> Land <strong>3D</strong></h1>
          <p>Drag. Launch. Flip. Land.</p>
          <button id="play-button" class="primary-button">PLAY</button>
          <button id="open-levels-button" class="secondary-button">LEVELS</button>
        </section>
      </div>
      <div id="selection-overlay" class="overlay hidden">
        <section class="panel selection-panel">
          <button id="selection-back" class="back-button">←</button>
          <h2>SELECT LEVEL</h2>
          <div id="level-grid" class="level-grid"></div>
          <h2>SELECT VEHICLE</h2>
          <div id="vehicle-grid" class="vehicle-grid"></div>
          <button id="start-level-button" class="primary-button">START</button>
        </section>
      </div>
      <div id="pause-overlay" class="overlay hidden">
        <section class="panel compact-panel">
          <h2>PAUSED</h2>
          <button id="resume-button" class="primary-button">RESUME</button>
          <button id="pause-restart-button" class="secondary-button">RESTART</button>
          <button id="pause-menu-button" class="secondary-button">LEVEL SELECT</button>
        </section>
      </div>
      <div id="result-overlay" class="overlay hidden">
        <section class="panel result-panel">
          <div id="result-kicker" class="result-kicker">LEVEL COMPLETE</div>
          <h2 id="result-title">PERFECT LANDING!</h2>
          <div id="result-stars" class="stars">☆☆☆</div>
          <div class="score-card">
            <div><span>SCORE</span><b id="result-score">0</b></div>
            <div><span>TIME</span><b id="result-time">0.0s</b></div>
            <div><span>COINS</span><b id="result-coins">0/0</b></div>
          </div>
          <button id="next-button" class="primary-button">NEXT LEVEL</button>
          <button id="retry-button" class="secondary-button">RETRY</button>
          <button id="result-menu-button" class="text-button">LEVEL SELECT</button>
        </section>
      </div>
      <div id="loading-overlay" class="overlay loading-overlay">
        <div class="loader"></div><p>Loading physics…</p>
      </div>
    </div>
  </body>
</html>
