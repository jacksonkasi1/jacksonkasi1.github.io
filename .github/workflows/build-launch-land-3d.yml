name: Build Eclipse Beast Run

on:
  push:
    branches: [main]
    paths:
      - 'eclipse-beast-run-source/**'
      - '.github/workflows/build-launch-land-3d.yml'
  pull_request:
    branches: [main]
    paths:
      - 'eclipse-beast-run-source/**'
      - '.github/workflows/build-launch-land-3d.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: eclipse-beast-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eclipse-beast-run-source
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: eclipse-beast-run-source/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate gameplay rules
        run: npm run validate

      - name: Production build
        run: npm run build

      - name: Publish bundled game
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        run: |
          rm -rf launch-land-3d
          mkdir -p launch-land-3d
          cp -a eclipse-beast-run-source/dist/. launch-land-3d/
          touch launch-land-3d/.nojekyll

      - name: Commit deployed game
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A launch-land-3d
          if git diff --cached --quiet; then
            echo 'No deployment changes to commit.'
            exit 0
          fi
          git commit -m 'Deploy Eclipse Beast Run'
          git push
