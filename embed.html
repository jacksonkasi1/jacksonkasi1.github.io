<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>8-BitHub Embedded</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }
    
    .game-container {
      position: relative;
      width: 320px;
      height: 240px;
      background-color: #000;
      overflow: hidden;
    }
    
    /* CRT effect */
    .crt-effect {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 10;
    }
    
    /* Scanlines */
    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(0, 0, 0, 0.3) 51%
      );
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 12;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="game-container" id="game-container">
    <div class="crt-effect"></div>
    <div class="scanlines"></div>
  </div>
  
  <script src="8bithub.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Initialize the RetroEngine
      const gameContainer = document.getElementById('game-container');
      const engine = new RetroEngine(gameContainer);
      
      // Get game type from URL hash or default to arcade
      const hash = window.location.hash.substring(1);
      const gameType = (hash && ['arcade', 'adventure', 'demo'].includes(hash)) ? hash : 'arcade';
      
      // Load the selected disk
      engine.loadDisk(gameType);
      
      // Handle keyboard for text adventure input focus
      document.addEventListener('keydown', function(e) {
        if (engine.currentGame instanceof TextAdventure && e.key.length === 1) {
          // Focus game canvas for text input
          gameContainer.focus();
        }
      });
    });
  </script>
</body>
</html>
