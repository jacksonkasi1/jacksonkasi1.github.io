<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#75c9ff">
  <title>Launch & Land 3D</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#75c9ff;color:#fff;font:700 16px/1.45 system-ui,-apple-system,sans-serif}body{display:grid;place-items:center}.load{text-align:center;padding:24px;text-shadow:0 2px 8px #245}.spinner{width:48px;height:48px;margin:0 auto 16px;border:5px solid #ffffff55;border-top-color:#fff;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}button{border:0;border-radius:999px;padding:14px 24px;font:inherit}
  </style>
</head>
<body>
  <div class="load"><div class="spinner"></div><span id="load-status">Loading Launch &amp; Land 3D…</span></div>
  <script>
  (async()=>{
    const status=document.querySelector('#load-status');
    if(!('DecompressionStream' in window)) throw new Error('Please use a recent Chrome, Edge, Firefox, or Safari browser.');
    status.textContent='Downloading game…';
    const files=Array.from({length:9},(_,i)=>`data/p${i}.txt?v=20260722-3`);
    const encoded=(await Promise.all(files.map(async file=>{
      const response=await fetch(file,{cache:'no-store'});
      if(!response.ok) throw new Error(`Game download failed: ${file} (HTTP ${response.status}).`);
      return response.text();
    }))).join('').replace(/\s/g,'');
    const compressed=Uint8Array.from(atob(encoded),character=>character.charCodeAt(0));
    status.textContent='Starting game…';
    let html=await new Response(new Blob([compressed]).stream().pipeThrough(new DecompressionStream('gzip'))).text();

    const oldThree='import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js";';
    const safeThree=`let THREE;\nfor (const url of [\n  "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.min.js",\n  "https://fastly.jsdelivr.net/npm/three@0.185.1/build/three.module.min.js",\n  "https://unpkg.com/three@0.185.1/build/three.module.min.js"\n]) {\n  try { THREE = await import(url); break; } catch (error) { console.warn('Three.js load failed', url, error); }\n}\nif (!THREE) {\n  const loading = document.querySelector('#loading-overlay');\n  if (loading) loading.innerHTML = '<section class="panel compact-panel"><h2>STARTUP ERROR</h2><p>Unable to load the 3D renderer. Check your connection and reload.</p><button class="primary-button" onclick="location.reload()">RELOAD</button></section>';\n  throw new Error('Unable to load Three.js');\n}`;
    if(!html.includes(oldThree)) throw new Error('Hosted game patch target was not found.');
    html=html.replace(oldThree,safeThree)
      .replace('"https://cdn.skypack.dev/@dimforge/rapier3d-compat@0.19.3",','"https://fastly.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.19.3/rapier.mjs",')
      .replace('"https://esm.sh/@dimforge/rapier3d-compat@0.19.3"','"https://unpkg.com/@dimforge/rapier3d-compat@0.19.3/rapier.mjs"')
      .replace(')), 15000)', ')), 30000)');

    document.open();document.write(html);document.close();
  })().catch(error=>{
    console.error(error);
    document.body.innerHTML=`<div class="load"><h2>Unable to load the game</h2><p>${error.message}</p><button onclick="location.reload()">Retry</button></div>`;
  });
  </script>
</body>
</html>
