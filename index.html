<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>8-BitHub: Retro Gaming in GitHub</title>
  <style>
    body {
      background-color: #121212;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    
    h1 {
      text-shadow: 3px 3px 0px #ff5555;
      margin-bottom: 30px;
      text-align: center;
      font-size: 2.5em;
    }
    
    .game-container {
      position: relative;
      width: 320px;
      height: 240px;
      border: 10px solid #333;
      border-radius: 5px;
      box-shadow: 0 0 30px rgba(0, 0, 255, 0.3);
      overflow: hidden;
    }
    
    .instructions {
      margin-top: 30px;
      background-color: #222;
      padding: 15px;
      border-radius: 5px;
      border-left: 4px solid #5555ff;
      max-width: 500px;
    }
    
    .disk-selector {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      gap: 15px;
    }
    
    .disk {
      cursor: pointer;
      border: 3px solid transparent;
      border-radius: 5px;
      padding: 5px;
      transition: all 0.2s;
      width: 80px;
      height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }
    
    .disk:hover {
      transform: translateY(-5px);
    }
    
    .disk.active {
      border-color: #ffffff;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
    }
    
    .disk-icon {
      width: 60px;
      height: 60px;
      background-color: #111;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
    }
    
    .arcade-disk .disk-icon {
      background-color: #ff5555;
    }
    
    .adventure-disk .disk-icon {
      background-color: #55ff55;
    }
    
    .demo-disk .disk-icon {
      background-color: #5555ff;
    }
    
    .disk-label {
      font-size: 0.7em;
      margin-top: 5px;
    }
    
    /* CRT effect */
    .crt-effect {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 10;
    }
    
    /* Scanlines */
    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(0, 0, 0, 0.3) 51%
      );
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 12;
      opacity: 0.5;
    }
    
    /* Mobile responsiveness */
    @media (max-width: 600px) {
      .game-container {
        width: 280px;
        height: 210px;
      }
      
      .disk-selector {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <h1>8-BitHub</h1>
  
  <div class="game-container" id="game-container">
    <!-- CRT effects -->
    <div class="crt-effect"></div>
    <div class="scanlines"></div>
  </div>
  
  <div class="disk-selector">
    <div class="disk arcade-disk" data-disk="arcade">
      <div class="disk-icon">ARC</div>
      <div class="disk-label">ARCADE</div>
    </div>
    <div class="disk adventure-disk" data-disk="adventure">
      <div class="disk-icon">ADV</div>
      <div class="disk-label">ADVENTURE</div>
    </div>
    <div class="disk demo-disk" data-disk="demo">
      <div class="disk-icon">DEM</div>
      <div class="disk-label">DEMO</div>
    </div>
  </div>
  
  <div class="instructions">
    <h3>How to Play:</h3>
    <p><strong>Arcade Game:</strong> Arrow keys to move, Space to shoot</p>
    <p><strong>Text Adventure:</strong> Type commands like LOOK, GO N/S/E/W, TAKE [item], INV</p>
    <p><strong>Demo Scene:</strong> Just enjoy the visuals!</p>
  </div>
  
  <script src="8bithub.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Initialize the RetroEngine
      const gameContainer = document.getElementById('game-container');
      const engine = new RetroEngine(gameContainer);
      
      // Handle disk selection
      const disks = document.querySelectorAll('.disk');
      disks.forEach(disk => {
        disk.addEventListener('click', function() {
          // Remove active class from all disks
          disks.forEach(d => d.classList.remove('active'));
          
          // Add active class to selected disk
          this.classList.add('active');
          
          // Load the selected disk
          const diskId = this.getAttribute('data-disk');
          engine.loadDisk(diskId);
        });
      });
      
      // Check for hash in URL to load specific disk
      const hash = window.location.hash.substring(1);
      if (hash && ['arcade', 'adventure', 'demo'].includes(hash)) {
        const diskElement = document.querySelector(`.disk[data-disk="${hash}"]`);
        if (diskElement) {
          diskElement.click();
        }
      } else {
        // Default to arcade game
        document.querySelector('.disk[data-disk="arcade"]').click();
      }
      
      // Handle keyboard for text adventure input focus
      document.addEventListener('keydown', function(e) {
        if (engine.currentGame instanceof TextAdventure && e.key.length === 1) {
          // Focus game canvas for text input
          gameContainer.focus();
        }
      });
    });
  </script>
</body>
</html>
