<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#75c9ff">
  <title>Launch & Land 3D</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#75c9ff;color:#fff;font:700 16px/1.45 system-ui,-apple-system,sans-serif}body{display:grid;place-items:center}.load{text-align:center;padding:24px;text-shadow:0 2px 8px #245}.spinner{width:48px;height:48px;margin:0 auto 16px;border:5px solid #ffffff55;border-top-color:#fff;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="load"><div class="spinner"></div>Loading Launch &amp; Land 3D…</div>
  <script>
  (async()=>{
    if(!('DecompressionStream' in window)) throw new Error('Please open this game in a recent Chrome, Edge, Firefox, or Safari browser.');
    const files=Array.from({length:9},(_,i)=>`data/p${i}.txt`);
    const encoded=(await Promise.all(files.map(async file=>{
      const response=await fetch(file,{cache:'no-cache'});
      if(!response.ok) throw new Error(`Missing game file: ${file}`);
      return response.text();
    }))).join('').replace(/\s/g,'');
    const compressed=Uint8Array.from(atob(encoded),character=>character.charCodeAt(0));
    const html=await new Response(new Blob([compressed]).stream().pipeThrough(new DecompressionStream('gzip'))).text();
    document.open();
    document.write(html);
    document.close();
  })().catch(error=>{
    console.error(error);
    document.body.innerHTML=`<div class="load"><h2>Unable to load the game</h2><p>${error.message}</p><button onclick="location.reload()" style="border:0;border-radius:999px;padding:14px 24px;font:inherit">Retry</button></div>`;
  });
  </script>
</body>
</html>
